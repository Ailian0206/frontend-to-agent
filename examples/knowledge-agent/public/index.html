<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人知识库 Agent</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f7f8;
        color: #172126;
        font: 15px/1.6 Inter, ui-sans-serif, system-ui, sans-serif;
      }
      main { width: min(860px, 100%); margin: 0 auto; padding: 32px 20px; }
      header { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid #d8dfe2; }
      h1 { margin: 0 0 16px; font-size: 24px; letter-spacing: 0; }
      #status { color: #5d6b72; font-size: 13px; }
      #messages { min-height: 58vh; padding: 24px 0; }
      .message { max-width: 78%; margin: 0 0 16px; padding: 12px 14px; border: 1px solid #d8dfe2; border-radius: 6px; white-space: pre-wrap; }
      .user { margin-left: auto; background: #172126; color: white; border-color: #172126; }
      .assistant { background: white; }
      form { display: grid; grid-template-columns: 1fr auto; gap: 10px; position: sticky; bottom: 0; padding: 16px 0; background: #f5f7f8; }
      textarea { min-height: 54px; resize: vertical; border: 1px solid #aeb9be; border-radius: 6px; padding: 12px; font: inherit; }
      button { width: 88px; border: 0; border-radius: 6px; background: #087f5b; color: white; font: 600 14px/1 system-ui; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      @media (max-width: 600px) { main { padding: 20px 14px; } .message { max-width: 92%; } }
    </style>
  </head>
  <body>
    <main>
      <header><h1>个人知识库 Agent</h1><span id="status">就绪</span></header>
      <section id="messages" aria-live="polite"></section>
      <form id="chat-form">
        <textarea id="message" required maxlength="8000" placeholder="询问发布、事故或报销规则"></textarea>
        <button type="submit">发送</button>
      </form>
    </main>
    <script>
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message");
      const messages = document.querySelector("#messages");
      const status = document.querySelector("#status");
      const button = form.querySelector("button");
      const threadId = localStorage.getItem("threadId") || crypto.randomUUID();
      localStorage.setItem("threadId", threadId);

      function append(role, text) {
        const node = document.createElement("div");
        node.className = `message ${role}`;
        node.textContent = text;
        messages.append(node);
        node.scrollIntoView({ behavior: "smooth", block: "end" });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        append("user", message);
        input.value = "";
        button.disabled = true;
        status.textContent = "思考中";

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message, threadId }),
          });
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || "请求失败");
          append("assistant", body.answer);
          status.textContent = "就绪";
        } catch (error) {
          append("assistant", `错误：${error.message}`);
          status.textContent = "失败";
        } finally {
          button.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
